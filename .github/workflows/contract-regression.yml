name: contract-regression

on:
  pull_request:
    paths:
      - 'go_server/**'
      - 'vue_web/**'
      - 'docs/**'
      - '.github/workflows/contract-regression.yml'
  push:
    branches:
      - master
    paths:
      - 'go_server/**'
      - 'vue_web/**'
      - 'docs/**'
      - '.github/workflows/contract-regression.yml'

jobs:
  contract-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go_server/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Show toolchain
        run: |
          go version
          node --version
          pnpm --version

      - name: Run contract regression
        run: bash go_server/scripts/ci/contract_regression.sh
