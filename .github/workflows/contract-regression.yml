name: contract-regression

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  contract-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Show toolchain
        run: |
          go version
          node --version
          pnpm --version

      - name: Run contract regression
        run: bash scripts/ci/contract_regression.sh
