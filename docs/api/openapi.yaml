components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选租户上下文。服务端必须校验是否属于 JWT 可访问范围。
    XWorkspaceId:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选工作区上下文。服务端必须校验是否属于 JWT 可访问范围。
    RequiredXTenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
      description: 未接入 JWT 阶段必须传入。
    RequiredXWorkspaceId:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        type: string
      description: 未接入 JWT 阶段必须传入。
    RequiredXUserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
      description: 未接入 JWT 阶段必须传入，服务端将 ownerId 映射为该值。
    XRoles:
      name: X-Roles
      in: header
      required: false
      schema:
        type: string
      description: 可选。逗号分隔角色列表，未提供时默认 `member`。
    XPolicyVersion:
      name: X-Policy-Version
      in: header
      required: false
      schema:
        type: string
      description: 可选。授权策略版本，未提供时默认 `v0.1`。
    XTraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选。链路追踪 ID，未提供时服务端自动生成。
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 强烈建议传入。用于命令幂等去重；同 key 不同 payload 会返回冲突。
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: 若存在 cursor，则 cursor 优先级高于 page/pageSize，服务端必须忽略 page/pageSize。
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    CommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
    ShareId:
      name: shareId
      in: path
      required: true
      schema:
        type: string
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    CapabilityId:
      name: capabilityId
      in: path
      required: true
      schema:
        type: string
    InstallId:
      name: installId
      in: path
      required: true
      schema:
        type: string
    StreamId:
      name: streamId
      in: path
      required: true
      schema:
        type: string

  responses:
    ErrorResponse:
      description: 'Error（响应体固定为 { error: { code, messageKey, details } }）'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Visibility:
      type: string
      enum: [PRIVATE, WORKSPACE, TENANT, PUBLIC]

    Permission:
      type: string
      enum: [READ, WRITE, EXECUTE, MANAGE, SHARE]

    ACLItem:
      type: object
      required: [subjectType, subjectId, permissions]
      properties:
        subjectType:
          type: string
          enum: [user, role, workspace]
        subjectId:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ResourceBase:
      type: object
      required:
        - id
        - tenantId
        - workspaceId
        - ownerId
        - visibility
        - acl
        - createdAt
        - updatedAt
        - status
      properties:
        id:
          type: string
        tenantId:
          type: string
        workspaceId:
          type: string
        ownerId:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        acl:
          type: array
          items:
            $ref: '#/components/schemas/ACLItem'
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommandRef:
      type: object
      required: [commandId, status, acceptedAt]
      properties:
        commandId:
          type: string
        status:
          type: string
        acceptedAt:
          type: string
          format: date-time

    Error:
      type: object
      required: [code, messageKey]
      properties:
        code:
          type: string
          description: 机器可读错误码
        messageKey:
          type: string
          description: i18n key（即 messageKey）
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      description: 固定外层字段为 error，不返回裸 error 对象。
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Error'

    PageInfo:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    CursorInfo:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true

    ProviderReadiness:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, degraded]
        error:
          type: string
          nullable: true

    Command:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [commandType, payload]
          properties:
            commandType:
              type: string
              example: workflow.run
            payload:
              type: object
              additionalProperties: true
            result:
              type: object
              additionalProperties: true
            error:
              $ref: '#/components/schemas/Error'

    CommandCreateRequest:
      type: object
      required: [commandType, payload]
      properties:
        commandType:
          type: string
        payload:
          type: object
          additionalProperties: true
        visibility:
          $ref: '#/components/schemas/Visibility'
          description: 可选。默认 PRIVATE；若提升可见性但策略不允许将返回 FORBIDDEN。

    Share:
      type: object
      required:
        - id
        - tenantId
        - workspaceId
        - resourceType
        - resourceId
        - subjectType
        - subjectId
        - permissions
        - createdBy
        - createdAt
      properties:
        id:
          type: string
        tenantId:
          type: string
        workspaceId:
          type: string
        resourceType:
          type: string
          enum: [command, asset]
        resourceId:
          type: string
        subjectType:
          type: string
          enum: [user]
        subjectId:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    ShareCreateRequest:
      type: object
      required: [resourceType, resourceId, subjectType, subjectId, permissions]
      properties:
        resourceType:
          type: string
          enum: [command, asset]
        resourceId:
          type: string
        subjectType:
          type: string
          enum: [user]
        subjectId:
          type: string
        permissions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Permission'
        expiresAt:
          type: string
          format: date-time
          nullable: true

    Asset:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, type, mime, size, hash, uri]
          properties:
            name:
              type: string
            type:
              type: string
            mime:
              type: string
            size:
              type: integer
            hash:
              type: string
            uri:
              type: string
            metadata:
              type: object
              additionalProperties: true

    AssetCreateRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
        name:
          type: string
        type:
          type: string
        mime:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'

    AssetUpdateRequest:
      type: object
      properties:
        name:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        metadata:
          type: object
          additionalProperties: true

    WorkflowTemplate:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, graph]
          properties:
            name:
              type: string
            description:
              type: string
            graph:
              type: object
              additionalProperties: true
            schemaInputs:
              type: object
              additionalProperties: true
            schemaOutputs:
              type: object
              additionalProperties: true
            uiState:
              type: object
              additionalProperties: true
            currentVersion:
              type: string

    WorkflowTemplateCreateRequest:
      type: object
      required: [name, graph]
      properties:
        name:
          type: string
        description:
          type: string
        graph:
          type: object
          additionalProperties: true
        schemaInputs:
          type: object
          additionalProperties: true
        schemaOutputs:
          type: object
          additionalProperties: true
        visibility:
          $ref: '#/components/schemas/Visibility'

    WorkflowTemplatePatchRequest:
      type: object
      properties:
        graph:
          type: object
          additionalProperties: true
        operations:
          type: array
          items:
            type: object
            additionalProperties: true
      description: 至少需要提供 graph 或 operations 之一。
      anyOf:
        - required: [graph]
        - required: [operations]

    WorkflowRun:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [templateId, templateVersion]
          properties:
            templateId:
              type: string
            templateVersion:
              type: string
            inputs:
              type: object
              additionalProperties: true
            outputs:
              type: object
              additionalProperties: true
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
              nullable: true
            error:
              $ref: '#/components/schemas/Error'

    WorkflowRunCreateRequest:
      type: object
      required: [templateId]
      properties:
        templateId:
          type: string
        templateVersion:
          type: string
        inputs:
          type: object
          additionalProperties: true
        mode:
          type: string
          enum: [sync, running, fail]
          default: sync
        visibility:
          $ref: '#/components/schemas/Visibility'

    StepRun:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [runId, stepKey]
          properties:
            runId:
              type: string
            stepKey:
              type: string
            stepType:
              type: string
            attempt:
              type: integer
            input:
              type: object
              additionalProperties: true
            output:
              type: object
              additionalProperties: true
            artifacts:
              type: object
              additionalProperties: true
            logRef:
              type: string
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
              nullable: true
            error:
              $ref: '#/components/schemas/Error'

    Capability:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, kind, version]
          properties:
            name:
              type: string
            kind:
              type: string
              enum: [tool, model, skill, algorithmRef]
            version:
              type: string
            providerId:
              type: string
            inputSchema:
              type: object
              additionalProperties: true
            outputSchema:
              type: object
              additionalProperties: true
            requiredPermissions:
              type: array
              items:
                type: string
            egressPolicy:
              type: object
              additionalProperties: true

    Algorithm:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, version]
          properties:
            name:
              type: string
            version:
              type: string
            templateRef:
              type: string
            defaults:
              type: object
              additionalProperties: true
            constraints:
              type: object
              additionalProperties: true
            dependencies:
              type: object
              additionalProperties: true

    CapabilityProvider:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, providerType]
          properties:
            name:
              type: string
            providerType:
              type: string
              enum: [http, container, mcp]
            endpoint:
              type: string
            metadata:
              type: object
              additionalProperties: true

    PluginPackage:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, version, packageType]
          properties:
            name:
              type: string
            version:
              type: string
            packageType:
              type: string
              enum: [tool-provider, skill-pack, algo-pack, mcp-provider]
            manifest:
              type: object
              additionalProperties: true

    PluginInstall:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [packageId, scope]
          properties:
            packageId:
              type: string
            scope:
              type: string
              enum: [workspace, tenant]
            error:
