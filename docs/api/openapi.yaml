          $ref: '#/components/responses/ErrorResponse'

  /streams/{streamId}:kick:
    post:
      tags: [Stream]
      summary: Kick stream connection (domain sugar -> command)
      operationId: kickStream
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/StreamId'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseStream'
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选租户上下文。服务端必须校验是否属于 JWT 可访问范围。
    XWorkspaceId:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选工作区上下文。服务端必须校验是否属于 JWT 可访问范围。
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: 若存在 cursor，则 cursor 优先级高于 page/pageSize，服务端必须忽略 page/pageSize。
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    CommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    CapabilityId:
      name: capabilityId
      in: path
      required: true
      schema:
        type: string
    InstallId:
      name: installId
      in: path
      required: true
      schema:
        type: string
    StreamId:
      name: streamId
      in: path
      required: true
      schema:
        type: string

  responses:
    ErrorResponse:
      description: 'Error（响应体固定为 { error: { code, messageKey, details } }）'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Visibility:
      type: string
      enum: [PRIVATE, WORKSPACE, TENANT, PUBLIC]

    Permission:
      type: string
      enum: [READ, WRITE, EXECUTE, MANAGE, SHARE]

    ACLItem:
      type: object
      required: [subjectType, subjectId, permissions]
      properties:
        subjectType:
          type: string
          enum: [user, role, workspace]
        subjectId:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ResourceBase:
      type: object
      required:
        - id
        - tenantId
        - workspaceId
        - ownerId
        - visibility
        - acl
        - createdAt
        - updatedAt
        - status
      properties:
        id:
          type: string
        tenantId:
          type: string
        workspaceId:
          type: string
        ownerId:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        acl:
          type: array
          items:
            $ref: '#/components/schemas/ACLItem'
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommandRef:
      type: object
      required: [commandId, status, acceptedAt]
      properties:
        commandId:
          type: string
        status:
          type: string
        acceptedAt:
          type: string
          format: date-time

    Error:
      type: object
      required: [code, messageKey]
      properties:
        code:
          type: string
          description: 机器可读错误码
        messageKey:
          type: string
          description: i18n key（即 messageKey）
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      description: 固定外层字段为 error，不返回裸 error 对象。
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Error'

    PageInfo:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    CursorInfo:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true

    Command:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [commandType, payload]
          properties:
            commandType:
              type: string
              example: workflow.run
            payload:
              type: object
              additionalProperties: true
            result:
              type: object
              additionalProperties: true
            error:
              $ref: '#/components/schemas/Error'

    CommandCreateRequest:
      type: object
      required: [commandType, payload]
      properties:
        commandType:
          type: string
        payload:
          type: object
          additionalProperties: true

    Asset:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, assetType, mimeType]
          properties:
            name:
              type: string
            assetType:
              type: string
            mimeType:
              type: string
            size:
              type: integer
            hash:
              type: string
            uri:
              type: string
            metadata:
              type: object
              additionalProperties: true

    AssetCreateRequest:
      type: object
      required: [name, assetType]
      properties:
        name:
          type: string
        assetType:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        metadata:
          type: object
          additionalProperties: true
        dataRef:
          type: string
          description: 上传后引用或预签名上传引用

    AssetUpdateRequest:
      type: object
      properties:
        name:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        metadata:
          type: object
          additionalProperties: true

    WorkflowTemplate:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, graph]
          properties:
            name:
              type: string
            description:
              type: string
            graph:
              type: object
              additionalProperties: true
            schemaInputs:
              type: object
              additionalProperties: true
            schemaOutputs:
              type: object
              additionalProperties: true
            uiState:
              type: object
              additionalProperties: true
            currentVersion:
              type: string

    WorkflowTemplateCreateRequest:
      type: object
      required: [name, graph]
      properties:
        name:
          type: string
        description:
          type: string
        graph:
          type: object
          additionalProperties: true
        schemaInputs:
          type: object
          additionalProperties: true
        schemaOutputs:
          type: object
          additionalProperties: true
        visibility:
          $ref: '#/components/schemas/Visibility'

    WorkflowTemplatePatchRequest:
      type: object
      required: [operations]
      properties:
        operations:
          type: array
          items:
            type: object
            additionalProperties: true

    WorkflowRun:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [templateId, templateVersion]
          properties:
            templateId:
              type: string
            templateVersion:
              type: string
            inputs:
              type: object
              additionalProperties: true
            outputs:
              type: object
              additionalProperties: true
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
              nullable: true
            error:
              $ref: '#/components/schemas/Error'

    WorkflowRunCreateRequest:
      type: object
      required: [templateId]
      properties:
        templateId:
          type: string
        templateVersion:
          type: string
        inputs:
          type: object
          additionalProperties: true
        visibility:
          $ref: '#/components/schemas/Visibility'

    StepRun:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [runId, stepKey]
          properties:
            runId:
              type: string
            stepKey:
              type: string
            stepType:
              type: string
            attempt:
              type: integer
            input:
              type: object
              additionalProperties: true
            output:
              type: object
              additionalProperties: true
            logRef:
              type: string
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
              nullable: true
            error:
              $ref: '#/components/schemas/Error'

    Capability:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, kind, version]
          properties:
            name:
              type: string
            kind:
              type: string
              enum: [tool, model, skill, algorithmRef]
            version:
              type: string
            providerId:
              type: string
            inputSchema:
              type: object
              additionalProperties: true
            outputSchema:
              type: object
              additionalProperties: true
            requiredPermissions:
              type: array
              items:
                type: string
            egressPolicy:
              type: object
              additionalProperties: true

    Algorithm:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, version]
          properties:
            name:
              type: string
            version:
              type: string
            templateRef:
              type: string
            defaults:
              type: object
              additionalProperties: true
            constraints:
              type: object
              additionalProperties: true
            dependencies:
              type: object
              additionalProperties: true

    CapabilityProvider:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, providerType]
          properties:
            name:
              type: string
            providerType:
              type: string
              enum: [http, container, mcp]
            endpoint:
              type: string
            metadata:
              type: object
              additionalProperties: true

    PluginPackage:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, version, packageType]
          properties:
            name:
              type: string
            version:
              type: string
            packageType:
              type: string
              enum: [tool-provider, skill-pack, algo-pack, mcp-provider]
            manifest:
              type: object
              additionalProperties: true

    PluginInstall:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [packageId, scope]
          properties:
            packageId:
              type: string
            scope:
              type: string
              enum: [workspace, tenant]
            error:
              $ref: '#/components/schemas/Error'

    PluginPackageUploadRequest:
      type: object
      required: [name, version, packageType]
      properties:
        name:
          type: string
        version:
          type: string
        packageType:
          type: string
        manifest:
          type: object
          additionalProperties: true
        visibility:
          $ref: '#/components/schemas/Visibility'

    PluginInstallRequest:
      type: object
      required: [packageId]
      properties:
        packageId:
          type: string
        scope:
          type: string
          enum: [workspace, tenant]
          default: workspace

    Stream:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [path, protocol]
          properties:
            path:
              type: string
            protocol:
              type: string
              enum: [rtsp, rtmp, srt, webrtc, hls]
            source:
              type: string
              enum: [push, pull]
            endpoints:
              type: object
              additionalProperties: true
            state:
              type: object
              additionalProperties: true

    StreamCreateRequest:
      type: object
      required: [path, protocol]
      properties:
        path:
          type: string
        protocol:
          type: string
        source:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        metadata:
          type: object
          additionalProperties: true

    WriteResponseAsset:
      type: object
      required: [resource, commandRef]
      properties:
        resource:
          $ref: '#/components/schemas/Asset'
        commandRef:
          $ref: '#/components/schemas/CommandRef'

    WriteResponseWorkflowTemplate:
      type: object
      required: [resource, commandRef]
      properties:
        resource:
          $ref: '#/components/schemas/WorkflowTemplate'
        commandRef:
          $ref: '#/components/schemas/CommandRef'

    WriteResponseWorkflowRun:
      type: object
      required: [resource, commandRef]
      properties:
        resource:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
            status:
              type: string
        commandRef:
          $ref: '#/components/schemas/CommandRef'

    WriteResponsePluginPackage:
      type: object
      required: [resource, commandRef]
      properties:
        resource:
          $ref: '#/components/schemas/PluginPackage'
        commandRef:
          $ref: '#/components/schemas/CommandRef'

    WriteResponsePluginInstall:
      type: object
      required: [resource, commandRef]
      properties:
        resource:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
            status:
              type: string
        commandRef:
          $ref: '#/components/schemas/CommandRef'

    WriteResponseStream:
      type: object
      required: [resource, commandRef]
      properties:
        resource:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
            status:
              type: string
        commandRef:
          $ref: '#/components/schemas/CommandRef'

    CommandListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Command'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    AssetListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    WorkflowTemplateListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTemplate'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    WorkflowRunListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowRun'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    StepRunListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StepRun'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    CapabilityListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Capability'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    AlgorithmListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Algorithm'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    ProviderListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityProvider'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    PluginPackageListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginPackage'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'

    StreamListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Stream'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
        cursorInfo:
          $ref: '#/components/schemas/CursorInfo'
