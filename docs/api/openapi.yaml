components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选租户上下文。服务端必须校验是否属于 JWT 可访问范围。
    XWorkspaceId:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选工作区上下文。服务端必须校验是否属于 JWT 可访问范围。
    RequiredXTenantId:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: 当 `GOYAIS_AUTH_CONTEXT_MODE=header_only` 或请求未携带有效 Bearer JWT 时必须传入。
    RequiredXWorkspaceId:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
      description: 当 `GOYAIS_AUTH_CONTEXT_MODE=header_only` 或请求未携带有效 Bearer JWT 时必须传入。
    RequiredXUserId:
      name: X-User-Id
      in: header
      required: false
      schema:
        type: string
      description: 当 `GOYAIS_AUTH_CONTEXT_MODE=header_only` 或请求未携带有效 Bearer JWT 时必须传入，服务端将 ownerId 映射为该值。
    XRoles:
      name: X-Roles
      in: header
      required: false
      schema:
        type: string
      description: 可选。逗号分隔角色列表；当存在 JWT claims 时仅允许在 claims.roles 范围内覆盖。
    XPolicyVersion:
      name: X-Policy-Version
      in: header
      required: false
      schema:
        type: string
      description: 可选。授权策略版本，未提供时默认 `v0.1`。
    XTraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
      description: 可选。链路追踪 ID，未提供时服务端自动生成。
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 强烈建议传入。用于命令幂等去重；同 key 不同 payload 会返回冲突。
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: 若存在 cursor，则 cursor 优先级高于 page/pageSize，服务端必须忽略 page/pageSize。
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    CommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
    ShareId:
      name: shareId
      in: path
      required: true
      schema:
        type: string
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    CapabilityId:
      name: capabilityId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    AlgorithmId:
      name: algorithmId
      in: path
      required: true
      schema:
        type: string
    PackageId:
      name: packageId
      in: path
      required: true
      schema:
        type: string
    InstallId:
      name: installId
      in: path
      required: true
      schema:
        type: string
    BundleId:
      name: bundleId
      in: path
      required: true
      schema:
        type: string
    StreamId:
      name: streamId
      in: path
      required: true
      schema:
        type: string

  responses:
    ErrorResponse:
      description: 'Error（响应体固定为 { error: { code, messageKey, details } }）'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Visibility:
      type: string
      enum: [PRIVATE, WORKSPACE, TENANT, PUBLIC]

    Permission:
      type: string
      enum: [READ, WRITE, EXECUTE, MANAGE, SHARE]

    ACLItem:
      type: object
      required: [subjectType, subjectId, permissions]
      properties:
        subjectType:
          type: string
          enum: [user, role]
        subjectId:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ResourceBase:
      type: object
      required:
        - id
        - tenantId
        - workspaceId
        - ownerId
        - visibility
        - acl
        - createdAt
        - updatedAt
        - status
      properties:
        id:
          type: string
        tenantId:
          type: string
        workspaceId:
          type: string
        ownerId:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        acl:
          type: array
          items:
            $ref: '#/components/schemas/ACLItem'
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommandRef:
      type: object
      required: [commandId, status, acceptedAt]
      properties:
        commandId:
          type: string
        status:
          type: string
        acceptedAt:
          type: string
          format: date-time

    Error:
      type: object
      required: [code, messageKey]
      properties:
        code:
          type: string
          description: 机器可读错误码
        messageKey:
          type: string
          description: i18n key（即 messageKey）
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      description: 固定外层字段为 error，不返回裸 error 对象。
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Error'

    PageInfo:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    CursorInfo:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true

    ProviderReadiness:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, degraded]
        error:
          type: string
          nullable: true

    Command:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [commandType, payload, acceptedAt, traceId]
          properties:
            commandType:
              type: string
              example: workflow.run
            payload:
              type: object
              additionalProperties: true
            acceptedAt:
              type: string
              format: date-time
            traceId:
              type: string
            result:
              type: object
              additionalProperties: true
            error:
              $ref: '#/components/schemas/Error'

    CommandCreateRequest:
      type: object
      required: [commandType, payload]
      properties:
        commandType:
          type: string
          description: |
            支持的关键 commandType（v0.1）包括：
            `asset.upload`、`share.create`、`share.delete`、
            `workflow.createDraft`、`workflow.patch`、`workflow.publish`、
            `workflow.run`、`workflow.retry`、`workflow.cancel`、`algorithm.run`、
            `plugin.upload`、`plugin.install`、`plugin.enable`、
            `plugin.disable`、`plugin.rollback`、`plugin.upgrade`、
            `stream.create`、`stream.updateAuth`、`stream.delete`、
            `stream.record.start`、`stream.record.stop`、`stream.kick`、
            `ai.session.create`、`ai.session.archive`、`ai.intent.plan`、
            `ai.command.execute`、`context.bundle.rebuild`。
        payload:
          type: object
          additionalProperties: true
        visibility:
          $ref: '#/components/schemas/Visibility'
          description: 可选。默认 PRIVATE；若提升可见性但策略不允许将返回 FORBIDDEN。

    AISession:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [title]
          properties:
            title:
              type: string
            goal:
              type: string
            inputs:
              type: object
              additionalProperties: true
            constraints:
              type: object
              additionalProperties: true
            preferences:
              type: object
              additionalProperties: true
            archivedAt:
              type: string
              format: date-time
              nullable: true
            lastTurnAt:
              type: string
              format: date-time
              nullable: true

    AISessionTurn:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [sessionId, role, content]
          properties:
            sessionId:
              type: string
            role:
              type: string
              enum: [user, assistant, system]
            content:
              type: string
            commandType:
              type: string
              nullable: true
            commandIds:
              type: array
              items:
                type: string

    AISessionCreateRequest:
      type: object
      properties:
        title:
          type: string
        goal:
          type: string
        inputs:
          type: object
          additionalProperties: true
        constraints:
          type: object
          additionalProperties: true
        preferences:
          type: object
          additionalProperties: true
        intentCommandType:
          type: string
          description: '可选显式意图命令类型（例如 workflow.run），用于与 execute 模式对齐。'
        intentPayload:
          type: object
          additionalProperties: true
          description: 'intentCommandType 对应 payload；未提供时由服务端确定性规划器推断。'
        visibility:
          $ref: '#/components/schemas/Visibility'

    AISessionTurnCreateRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        execute:
          type: boolean
          default: false
          description: false 时提交 `ai.intent.plan`，true 时提交 `ai.command.execute`。
        inputs:
          type: object
          additionalProperties: true
        constraints:
