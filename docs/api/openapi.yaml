openapi: 3.0.3
info:
  title: Goyais API
  version: 1.0.0
  description: |
    Goyais v0.1 初版 API 契约。
    - API 基础路径固定为 /api/v1
    - v0.1 通过 x-release 标注，不体现在 URL
    - 所有错误响应固定外层包装：{ error: { code, messageKey, details } }
    - messageKey 即 i18nKey
  x-release: v0.1
servers:
  - url: /api/v1
tags:
  - name: Health
    description: 健康检查
  - name: Command
    description: Command-first 规范入口
  - name: Share
    description: 资源 ACL 分享（v0.1 支持 command/asset）
  - name: Asset
    description: 资产管理
  - name: WorkflowTemplate
    description: DAG 模板
  - name: WorkflowRun
    description: 运行与回放
  - name: Registry
    description: 能力与算法注册中心
  - name: PluginMarket
    description: 插件市场
  - name: Stream
    description: 流媒体控制面

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    description: 构建注入版本信息（tag/commit/semver）。
                    example: v0.1.0
                  mode:
                    type: string
                    description: 当前运行模式（可选），用于 minimal/full 验收。
                    enum: [minimal, full]
                    example: minimal
                  providers:
                    type: object
                    description: 当前生效 provider 选择（可选），用于 provider 切换验收。
                    properties:
                      db:
                        type: string
                        example: sqlite
                      cache:
                        type: string
                        example: memory
                      vector:
                        type: string
                        example: sqlite
                      objectStore:
                        type: string
                        example: local
                      stream:
                        type: string
                        example: mediamtx
                  details:
                    type: object
                    description: provider 细粒度可用性（ready/degraded），异常时在 error 返回如认证失败等原因。
                    properties:
                      providers:
                        type: object
                        properties:
                          db:
                            $ref: '#/components/schemas/ProviderReadiness'
                          cache:
                            $ref: '#/components/schemas/ProviderReadiness'
                          vector:
                            $ref: '#/components/schemas/ProviderReadiness'
                          objectStore:
                            $ref: '#/components/schemas/ProviderReadiness'
                          stream:
                            $ref: '#/components/schemas/ProviderReadiness'

  /system/healthz:
    get:
      tags: [Health]
      summary: Health check (alias)
      operationId: systemHealthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    description: 构建注入版本信息（tag/commit/semver）。
                    example: v0.1.0
                  mode:
                    type: string
                    description: 当前运行模式（可选），用于 minimal/full 验收。
                    enum: [minimal, full]
                    example: minimal
                  providers:
                    type: object
                    description: 当前生效 provider 选择（可选），用于 provider 切换验收。
                    properties:
                      db:
                        type: string
                        example: sqlite
                      cache:
                        type: string
                        example: memory
                      vector:
                        type: string
                        example: sqlite
                      objectStore:
                        type: string
                        example: local
                      stream:
                        type: string
                        example: mediamtx
                  details:
                    type: object
                    description: provider 细粒度可用性（ready/degraded）。
                    properties:
                      providers:
                        type: object
                        properties:
                          db:
                            $ref: '#/components/schemas/ProviderReadiness'
                          cache:
                            $ref: '#/components/schemas/ProviderReadiness'
                          vector:
                            $ref: '#/components/schemas/ProviderReadiness'
                          objectStore:
                            $ref: '#/components/schemas/ProviderReadiness'
                          stream:
                            $ref: '#/components/schemas/ProviderReadiness'

  /commands:
    get:
      tags: [Command]
      summary: List commands
      description: 固定排序为 created_at DESC, id DESC。若提供 cursor，服务端忽略 page/pageSize，二者都使用同一排序语义。可读过滤在 repository/SQL 层完成（owner OR WORKSPACE OR ACL.READ）。
      operationId: listCommands
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Command list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Command]
      summary: Submit command (canonical)
      operationId: createCommand
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required: [resource, commandRef]
                properties:
                  resource:
                    $ref: '#/components/schemas/Command'
                  commandRef:
                    $ref: '#/components/schemas/CommandRef'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /commands/{commandId}:
    get:
      tags: [Command]
      summary: Get command by id
      operationId: getCommand
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Command detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /shares:
    post:
      tags: [Share]
      summary: Create share entry
      description: |
        v0.1 限定：
        - resourceType 支持 command/asset
        - subjectType 必须为 user
        - permissions 必须来自固定枚举
        创建前服务端会校验分享者对同一资源的 SHARE 权限（owner 或已有 ACL.SHARE）。
      operationId: createShare
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseShare'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Share]
      summary: List shares
      description: 固定排序为 created_at DESC, id DESC。若提供 cursor，服务端忽略 page/pageSize。
      operationId: listShares
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Share list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /shares/{shareId}:
