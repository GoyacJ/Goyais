openapi: 3.0.3
info:
  title: Goyais API
  version: 1.0.0
  description: |
    Goyais v0.1 初版 API 契约。
    - API 基础路径固定为 /api/v1
    - v0.1 通过 x-release 标注，不体现在 URL
    - 所有错误响应固定外层包装：{ error: { code, messageKey, details } }
    - messageKey 即 i18nKey
  x-release: v0.1
servers:
  - url: /api/v1
tags:
  - name: Health
    description: 健康检查
  - name: Command
    description: Command-first 规范入口
  - name: Asset
    description: 资产管理
  - name: WorkflowTemplate
    description: DAG 模板
  - name: WorkflowRun
    description: 运行与回放
  - name: Registry
    description: 能力与算法注册中心
  - name: PluginMarket
    description: 插件市场
  - name: Stream
    description: 流媒体控制面

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    description: 构建注入版本信息（tag/commit/semver）。
                    example: v0.1.0
                  mode:
                    type: string
                    description: 当前运行模式（可选），用于 minimal/full 验收。
                    enum: [minimal, full]
                    example: minimal
                  providers:
                    type: object
                    description: 当前生效 provider 选择（可选），用于 provider 切换验收。
                    properties:
                      db:
                        type: string
                        example: sqlite
                      cache:
                        type: string
                        example: memory
                      vector:
                        type: string
                        example: sqlite
                      objectStore:
                        type: string
                        example: local
                      stream:
                        type: string
                        example: mediamtx

  /commands:
    get:
      tags: [Command]
      summary: List commands
      operationId: listCommands
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Command list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Command]
      summary: Submit command (canonical)
      operationId: createCommand
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required: [resource, commandRef]
                properties:
                  resource:
                    $ref: '#/components/schemas/Command'
                  commandRef:
                    $ref: '#/components/schemas/CommandRef'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /commands/{commandId}:
    get:
      tags: [Command]
      summary: Get command by id
      operationId: getCommand
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Command detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets:
    get:
      tags: [Asset]
      summary: List assets
      operationId: listAssets
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Asset]
      summary: Create asset (domain sugar -> command)
      operationId: createAsset
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/{assetId}:
    get:
      tags: [Asset]
      summary: Get asset
      operationId: getAsset
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Asset]
      summary: Update asset (domain sugar -> command)
      operationId: updateAsset
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUpdateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Asset]
      summary: Delete asset (domain sugar -> command)
      operationId: deleteAsset
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/AssetId'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required: [resource, commandRef]
                properties:
                  resource:
                    type: object
                    required: [id, status]
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                        example: deleting
                  commandRef:
                    $ref: '#/components/schemas/CommandRef'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/{assetId}/lineage:
    get:
      tags: [Asset]
      summary: Get asset lineage graph
      operationId: getAssetLineage
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Lineage
          content:
            application/json:
              schema:
                type: object
                properties:
                  assetId:
                    type: string
                  nodes:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  edges:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'

  /workflow-templates:
