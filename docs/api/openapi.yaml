openapi: 3.0.3
info:
  title: Goyais API
  version: 1.0.0
  description: |
    Goyais v0.1 初版 API 契约。
    - API 基础路径固定为 /api/v1
    - v0.1 通过 x-release 标注，不体现在 URL
    - 所有错误响应固定外层包装：{ error: { code, messageKey, details } }
    - messageKey 即 i18nKey
  x-release: v0.1
servers:
  - url: /api/v1
tags:
  - name: Health
    description: 健康检查
  - name: Command
    description: Command-first 规范入口
  - name: Share
    description: 资源 ACL 分享（v0.1 支持 command/asset）
  - name: Asset
    description: 资产管理
  - name: WorkflowTemplate
    description: DAG 模板
  - name: WorkflowRun
    description: 运行与回放
  - name: Algorithm
    description: 算法运行（domain sugar -> command）
  - name: Registry
    description: 能力与算法注册中心
  - name: PluginMarket
    description: 插件市场
  - name: Stream
    description: 流媒体控制面
  - name: AISession
    description: AI 工作台会话与 turn 执行
  - name: ContextBundle
    description: 上下文索引与回放聚合

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    description: 构建注入版本信息（tag/commit/semver）。
                    example: v0.1.0
                  mode:
                    type: string
                    description: 当前运行模式（可选），用于 minimal/full 验收。
                    enum: [minimal, full]
                    example: minimal
                  providers:
                    type: object
                    description: 当前生效 provider 选择（可选），用于 provider 切换验收。
                    properties:
                      db:
                        type: string
                        example: sqlite
                      cache:
                        type: string
                        example: memory
                      vector:
                        type: string
                        example: sqlite
                      objectStore:
                        type: string
                        example: local
                      stream:
                        type: string
                        example: mediamtx
                      eventBus:
                        type: string
                        example: memory
                  details:
                    type: object
                    description: provider 细粒度可用性（ready/degraded），异常时在 error 返回如认证失败等原因。
                    properties:
                      providers:
                        type: object
                        properties:
                          db:
                            $ref: '#/components/schemas/ProviderReadiness'
                          cache:
                            $ref: '#/components/schemas/ProviderReadiness'
                          vector:
                            $ref: '#/components/schemas/ProviderReadiness'
                          objectStore:
                            $ref: '#/components/schemas/ProviderReadiness'
                          stream:
                            $ref: '#/components/schemas/ProviderReadiness'
                          event_bus:
                            $ref: '#/components/schemas/ProviderReadiness'

  /system/healthz:
    get:
      tags: [Health]
      summary: Health check (alias)
      operationId: systemHealthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    description: 构建注入版本信息（tag/commit/semver）。
                    example: v0.1.0
                  mode:
                    type: string
                    description: 当前运行模式（可选），用于 minimal/full 验收。
                    enum: [minimal, full]
                    example: minimal
                  providers:
                    type: object
                    description: 当前生效 provider 选择（可选），用于 provider 切换验收。
                    properties:
                      db:
                        type: string
                        example: sqlite
                      cache:
                        type: string
                        example: memory
                      vector:
                        type: string
                        example: sqlite
                      objectStore:
                        type: string
                        example: local
                      stream:
                        type: string
                        example: mediamtx
                      eventBus:
                        type: string
                        example: memory
                  details:
                    type: object
                    description: provider 细粒度可用性（ready/degraded）。
                    properties:
                      providers:
                        type: object
                        properties:
                          db:
                            $ref: '#/components/schemas/ProviderReadiness'
                          cache:
                            $ref: '#/components/schemas/ProviderReadiness'
                          vector:
                            $ref: '#/components/schemas/ProviderReadiness'
                          objectStore:
                            $ref: '#/components/schemas/ProviderReadiness'
                          stream:
                            $ref: '#/components/schemas/ProviderReadiness'
                          event_bus:
                            $ref: '#/components/schemas/ProviderReadiness'

  /commands:
    get:
      tags: [Command]
      summary: List commands
      description: 固定排序为 created_at DESC, id DESC。若提供 cursor，服务端忽略 page/pageSize，二者都使用同一排序语义。可读过滤在 repository/SQL 层完成（owner OR WORKSPACE OR ACL.READ）。
      operationId: listCommands
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Command list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Command]
      summary: Submit command (canonical)
      operationId: createCommand
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required: [resource, commandRef]
                properties:
                  resource:
                    $ref: '#/components/schemas/Command'
                  commandRef:
                    $ref: '#/components/schemas/CommandRef'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ai/sessions:
    get:
      tags: [AISession]
      summary: List AI sessions
      operationId: listAISessions
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: AI session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISessionListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [AISession]
      summary: Create AI session (domain sugar -> command)
      operationId: createAISession
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAISession'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ai/sessions/{sessionId}:
    get:
      tags: [AISession]
      summary: Get AI session
      operationId: getAISession
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: AI session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ai/sessions/{sessionId}:archive:
    post:
      tags: [AISession]
      summary: Archive AI session (domain sugar -> command)
      operationId: archiveAISession
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAISession'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ai/sessions/{sessionId}/turns:
    post:
      tags: [AISession]
      summary: Create AI turn (domain sugar -> command)
      operationId: createAISessionTurn
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionTurnCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAISessionTurn'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ai/sessions/{sessionId}/events:
    get:
      tags: [AISession]
      summary: Stream AI session events (SSE)
      operationId: streamAISessionEvents
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: |
            SSE event stream，包含以下事件类型：
            - `ai.turn.*`：会话回合事件
            - `command.*`：AI 关联 command 状态摘要
            - `workflow.run.*`：当关联 command 触发 workflow 时的运行摘要
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /commands/{commandId}:
    get:
      tags: [Command]
      summary: Get command by id
      operationId: getCommand
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Command detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /shares:
    post:
      tags: [Share]
      summary: Create share entry
      description: |
        v0.1 限定：
        - resourceType 支持 command/asset
        - subjectType 支持 user/role
        - permissions 必须来自固定枚举
        创建前服务端会校验分享者对同一资源的 SHARE 权限（owner 或已有 ACL.SHARE）。
        该接口为 domain sugar，服务端内部转换为 `share.create` command 执行。
        当 `GOYAIS_FEATURE_ACL_ROLE_SUBJECT=false` 时，`subjectType=role` 返回 `400 INVALID_SHARE_REQUEST`。
      operationId: createShare
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseShare'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Share]
      summary: List shares
      description: 固定排序为 created_at DESC, id DESC。若提供 cursor，服务端忽略 page/pageSize。
      operationId: listShares
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Share list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /shares/{shareId}:
    delete:
      tags: [Share]
      summary: Delete share entry
      description: 该接口为 domain sugar，服务端内部转换为 `share.delete` command 执行。
      operationId: deleteShare
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/ShareId'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseShare'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets:
    get:
      tags: [Asset]
      summary: List assets
      operationId: listAssets
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Asset]
      summary: Create asset (domain sugar -> command)
      operationId: createAsset
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAsset'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/{assetId}:
    get:
      tags: [Asset]
      summary: Get asset
      operationId: getAsset
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Asset]
      summary: Update asset (domain sugar -> command)
      operationId: updateAsset
      description: 受 `GOYAIS_FEATURE_ASSET_LIFECYCLE` 控制；关闭时返回 `501 NOT_IMPLEMENTED`。
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUpdateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAsset'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Asset]
      summary: Delete asset (domain sugar -> command)
      operationId: deleteAsset
      description: 受 `GOYAIS_FEATURE_ASSET_LIFECYCLE` 控制；关闭时返回 `501 NOT_IMPLEMENTED`。
      parameters:
        - $ref: '#/components/parameters/RequiredXTenantId'
        - $ref: '#/components/parameters/RequiredXWorkspaceId'
        - $ref: '#/components/parameters/RequiredXUserId'
        - $ref: '#/components/parameters/XRoles'
        - $ref: '#/components/parameters/XPolicyVersion'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/AssetId'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseAsset'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '501':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/{assetId}/lineage:
    get:
      tags: [Asset]
      summary: Get asset lineage graph
      operationId: getAssetLineage
      description: 受 `GOYAIS_FEATURE_ASSET_LIFECYCLE` 控制；关闭时返回 `501 NOT_IMPLEMENTED`。
      parameters:
