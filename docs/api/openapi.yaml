          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Stream]
      summary: Create stream (domain sugar -> command)
      operationId: createStream
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
