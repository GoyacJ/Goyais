  /streams/{streamId}:
    get:
      tags: [Stream]
      summary: Get stream
      operationId: getStream
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/StreamId'
      responses:
        '200':
          description: Stream detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stream'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /streams/{streamId}:record-start:
    post:
      tags: [Stream]
      summary: Start stream recording (domain sugar -> command)
      operationId: startStreamRecording
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/StreamId'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponseStream'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /streams/{streamId}:record-stop:
    post:
      tags: [Stream]
      summary: Stop stream recording (domain sugar -> command)
      operationId: stopStreamRecording
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/XWorkspaceId'
        - $ref: '#/components/parameters/StreamId'
      responses:
        '202':
          description: Accepted
